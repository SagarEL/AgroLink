name: agrolink
description: "AgroLink — Premium agriculture consultation management platform for agronomists and farmers."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4
  firebase_analytics: ^11.2.1
  cloud_functions: ^5.0.4

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  badges: ^3.1.2

  # Forms
  flutter_form_builder: ^10.3.0

  # Images
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # Maps
  url_launcher: ^6.3.0

  # Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.0

  # Utilities
  intl: any
  uuid: ^4.4.2
  collection: ^1.18.0
  logger: ^2.4.0
  rxdart: ^0.28.0

  # Export
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.4
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
